{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center h-full">
    <div class="bg-slate-800 p-8 rounded-xl shadow-2xl border border-slate-700 w-full max-w-md">
        <div class="text-center mb-10 flex flex-col items-center">
            <img src="/static/img/logo.svg" alt="Solu8i Logo" class="w-full max-w-[260px] h-auto mb-6">
            <!-- <h1 class="text-3xl font-bold text-white mb-2">Packing System</h1> -->
            <p class="text-slate-400">Sign in to continue</p>
        </div>
        
        <form 
            hx-post="/api/auth/token" 
            hx-swap="none"
            class="space-y-6"
        >
            <div id="login-error" class="text-red-400 text-sm hidden font-medium bg-red-900/30 p-3 rounded-lg border border-red-800/50"></div>
            
            <div>
                <label for="username" class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                <input type="text" id="username" name="username" required 
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                <input type="password" id="password" name="password" required 
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
            </div>
            
            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors flex justify-center items-center gap-2">
                Sign In
                <svg class="htmx-indicator animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.body.addEventListener('htmx:afterRequest', function(evt) {
        if(evt.detail.successful && evt.detail.elt.getAttribute('hx-post') === '/api/auth/token') {
            const resp = JSON.parse(evt.detail.xhr.response);
            localStorage.setItem('access_token', resp.access_token);
            
            // Decocde JWT to check role
            const base64Url = resp.access_token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            
            const payload = JSON.parse(jsonPayload);
            localStorage.setItem('user_role', payload.role);
            localStorage.setItem('username', payload.sub);
            
            if(payload.role === 'SUPER_ADMIN') {
                window.location.href = '/dashboard';
            } else {
                window.location.href = '/recorder';
            }
        }
        else if (evt.detail.failed) {
             const errorDiv = document.getElementById('login-error');
             if(evt.detail.xhr.status === 401) {
                 errorDiv.textContent = "Invalid username or password";
             } else {
                 errorDiv.textContent = "Login failed due to server error.";
             }
             errorDiv.classList.remove('hidden');
        }
    });
</script>
{% endblock %}
