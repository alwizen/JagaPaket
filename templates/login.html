{% extends "base.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center h-full">
    <div class="bg-slate-800 p-8 rounded-xl shadow-2xl border border-slate-700 w-full max-w-md">
        <div class="text-center flex flex-col items-center">
            <img src="/static/img/logo.png" alt="Solu8i Logo" class="w-full max-w-[260px] h-auto">
            <p class="text-slate-400">Sign in to continue</p>
        </div>
        
        <form 
            hx-post="/api/auth/token" 
            hx-swap="none"
            class="space-y-6"
        >
            <div id="login-error" class="text-red-400 text-sm hidden font-medium bg-red-900/30 p-3 rounded-lg border border-red-800/50"></div>
            
            <div>
                <label for="username" class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                <input type="text" placeholder="Masukkan Username" id="username" name="username" required 
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                <input type="password" placeholder="Masukkan Password" id="password" name="password" required 
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
            </div>
            
            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors flex justify-center items-center gap-2">
                Sign In
                <svg class="htmx-indicator animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>
    </div>
    <footer class="absolute bottom-0 left-0 right-0 border-t border-slate-700 px-6 py-3 flex justify-between items-center">
        <p class="text-xs text-slate-500">&copy; 2026 Jaga Paket. All rights reserved.</p>
        
        <!-- Theme Switcher -->
        <div class="flex bg-slate-800/50 p-1 rounded-lg gap-1 border border-slate-700">
            <button id="theme-light" onclick="setTheme('light')" class="theme-btn p-1 rounded transition-all text-slate-400 hover:text-white">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z"></path></svg>
            </button>
            <button id="theme-dark" onclick="setTheme('dark')" class="theme-btn p-1 rounded transition-all text-slate-400 hover:text-white">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
            <button id="theme-system" onclick="setTheme('system')" class="theme-btn p-1 rounded transition-all text-slate-400 hover:text-white">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            </button>
        </div>

        <p class="text-xs text-slate-500">Made with <span class="text-red-500">♥</span> Jaga Paket</p>
    </footer>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.body.addEventListener('htmx:afterRequest', function(evt) {
        if(evt.detail.successful && evt.detail.elt.getAttribute('hx-post') === '/api/auth/token') {
            const resp = JSON.parse(evt.detail.xhr.response);
            localStorage.setItem('access_token', resp.access_token);
            
            // Decocde JWT to check role
            const base64Url = resp.access_token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            
            const payload = JSON.parse(jsonPayload);
            localStorage.setItem('user_role', payload.role);
            localStorage.setItem('username', payload.sub);
            
            if(payload.role === 'SUPER_ADMIN') {
                window.location.href = '/dashboard';
            } else {
                window.location.href = '/recorder';
            }
        }
        else if (evt.detail.failed) {
             const errorDiv = document.getElementById('login-error');
             if(evt.detail.xhr.status === 401) {
                 errorDiv.textContent = "Invalid username or password";
             } else {
                 errorDiv.textContent = "Login failed due to server error.";
             }
             errorDiv.classList.remove('hidden');
        }
    });

    // Theme switcher logic
    function setTheme(theme) {
        localStorage.setItem('theme', theme);
        applyTheme(theme);
        updateThemeButtons(theme);
    }

    function applyTheme(theme) {
        const root = document.documentElement;
        if (theme === 'light') {
            root.classList.remove('dark');
        } else if (theme === 'dark') {
            root.classList.add('dark');
        } else {
            if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                root.classList.add('dark');
            } else {
                root.classList.remove('dark');
            }
        }
    }

    function updateThemeButtons(active) {
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.classList.remove('bg-blue-600', 'text-white', 'shadow-sm');
            btn.classList.add('text-slate-400');
        });
        const activeBtn = document.getElementById('theme-' + active);
        if (activeBtn) {
            activeBtn.classList.add('bg-blue-600', 'text-white', 'shadow-sm');
            activeBtn.classList.remove('text-slate-400');
        }
    }

    // Init theme on load
    document.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        applyTheme(savedTheme);
        updateThemeButtons(savedTheme);
    });
</script>
{% endblock %}
