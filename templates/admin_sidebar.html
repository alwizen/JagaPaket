            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>

            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>

            Made with <span class="text-red-500">♥</span> Jaga Paket
        </p>
    </div>
</aside>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const path = window.location.pathname;
        const links = document.querySelectorAll('.admin-nav-link');
        links.forEach(l => {
            if(l.getAttribute('href') === path) {
                l.classList.remove('text-slate-400', 'hover:bg-slate-800');
                l.classList.add('bg-blue-600', 'font-medium', 'text-white', 'shadow');
            }
        });
    });

    function toggleSidebar() {
        const sb = document.getElementById('admin-sidebar');
        if(!sb) return;
        if (sb.classList.contains('-translate-x-full')) {
            sb.classList.remove('-translate-x-full');
            sb.classList.replace('sm:translate-x-0', 'translate-x-0'); 
        } else {
            sb.classList.add('-translate-x-full');
            if(sb.classList.contains('sm:translate-x-0')) {
                sb.classList.remove('sm:translate-x-0');
            } else {
                sb.classList.add('sm:translate-x-0');
            }
        }
    }
</script>
