{% extends "base.html" %}

{% block content %}
<div class="h-full flex flex-col">
    {% set page_title = 'Device Management' %}
    {% include 'admin_navbar.html' %}

    <div class="flex flex-1 overflow-hidden relative">
        {% include "admin_sidebar.html" %}
        
        <div class="flex-1 bg-slate-900 p-8 overflow-y-auto">
            <div class="flex gap-6 max-w-7xl mx-auto w-full flex-col md:flex-row">
                <!-- Main View -->
                <div class="flex-[3]">
            <div class="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden mb-8">
                <table class="w-full text-left text-sm text-slate-300">
                    <thead class="text-xs uppercase bg-slate-800/80 text-slate-400 border-b border-slate-700">
                        <tr>
                            <th class="px-6 py-4">ID</th>
                            <th class="px-6 py-4">Device Name</th>
                            <th class="px-6 py-4">Location</th>
                            <th class="px-6 py-4">Created At</th>
                            <th class="px-6 py-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="devices-tbody" class="divide-y divide-slate-700/50">
                        <!-- Populated via JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Right Create Form -->
        <div class="flex-[1] bg-slate-800 border border-slate-700 rounded-xl p-6 h-fit shadow-xl">
            <h3 id="form-title" class="text-lg font-bold text-white mb-4">Add Device</h3>
            <form onsubmit="saveDevice(event)" id="device-form" class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Device Name</label>
                    <input type="text" id="add-device-name" required class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white outline-none focus:border-blue-500">
                    <p class="text-xs text-slate-500 mt-1">E.g. PackStation-A1</p>
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Location Details</label>
                    <input type="text" id="add-location" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white outline-none focus:border-blue-500">
                </div>
                <div class="flex flex-col gap-2 mt-4">
                    <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded transition-colors">
                        Create Device
                    </button>
                    <button type="button" onclick="cancelEdit()" id="cancel-btn" class="w-full hidden bg-slate-600 hover:bg-slate-700 text-white font-medium py-2 rounded transition-colors">
                        Batal
                    </button>
                </div>
            </form>
        </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const username = localStorage.getItem('username');
        if(!username || localStorage.getItem('user_role') !== 'SUPER_ADMIN') {
            window.location.href = '/'; return;
        }
        const ud = document.getElementById('username-display');
        if (ud) ud.textContent = username;
        loadDevices();
    });

    async function loadDevices() {
        try {
            const res = await fetch('/api/devices', { headers: App.authHeader() });
            const data = await res.json();
            
            const tbody = document.getElementById('devices-tbody');
            tbody.innerHTML = '';
            
            data.forEach(d => {
                const dateStr = new Date(d.created_at + (d.created_at.endsWith('Z') ? '' : 'Z')).toLocaleString('id-ID');
                const safePayload = encodeURIComponent(JSON.stringify(d));
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-700/30">
                        <td class="px-6 py-4 font-bold text-white">${d.id}</td>
                        <td class="px-6 py-4 font-medium text-emerald-400">${d.device_name}</td>
                        <td class="px-6 py-4">${d.location || '-'}</td>
                        <td class="px-6 py-4">${dateStr}</td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="editDevice('${safePayload}')" class="text-blue-400 hover:text-blue-300 font-medium text-sm mr-3">Edit</button>
                            <button onclick="deleteDevice(${d.id})" class="text-red-400 hover:text-red-300 font-medium text-sm">Delete</button>
                        </td>
                    </tr>
                `;
            });
        } catch(e) {
            App.showToast("Failed to load devices", "error");
        }
    }

    let editingDeviceId = null;

    function editDevice(deviceStr) {
        const d = JSON.parse(decodeURIComponent(deviceStr));
        editingDeviceId = d.id;
        document.getElementById('form-title').textContent = "Update Device";
        document.getElementById('add-device-name').value = d.device_name;
        document.getElementById('add-location').value = d.location || '';
        
        document.getElementById('submit-btn').textContent = "Save Changes";
        document.getElementById('submit-btn').classList.replace('bg-blue-600', 'bg-emerald-600');
        document.getElementById('submit-btn').classList.replace('hover:bg-blue-700', 'hover:bg-emerald-700');
        document.getElementById('cancel-btn').classList.remove('hidden');
    }

    function cancelEdit() {
        editingDeviceId = null;
        document.getElementById('device-form').reset();
        document.getElementById('form-title').textContent = "Add Device";
        document.getElementById('submit-btn').textContent = "Create Device";
        document.getElementById('submit-btn').classList.replace('bg-emerald-600', 'bg-blue-600');
        document.getElementById('submit-btn').classList.replace('hover:bg-emerald-700', 'hover:bg-blue-700');
        document.getElementById('cancel-btn').classList.add('hidden');
    }

    async function deleteDevice(id) {
        if(!confirm("Are you sure you want to delete this device?")) return;
        try {
            const res = await fetch(`/api/devices/${id}`, { method: 'DELETE', headers: App.authHeader() });
            if(res.ok) { App.showToast("Deleted", "success"); loadDevices(); }
            else { App.showToast((await res.json()).detail || "Failed", "error"); }
        } catch(e) {}
    }

    async function saveDevice(evt) {
        evt.preventDefault();
        
        const payload = {
            device_name: document.getElementById('add-device-name').value,
            location: document.getElementById('add-location').value || null
        };
        
        const method = editingDeviceId ? 'PUT' : 'POST';
        const url = editingDeviceId ? `/api/devices/${editingDeviceId}` : '/api/devices';
        
        try {
            const res = await fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    ...App.authHeader()
                },
                body: JSON.stringify(payload)
            });
            
            if(res.ok) {
                App.showToast(editingDeviceId ? "Device updated" : "Device created", "success");
                cancelEdit();
                loadDevices();
            } else {
                const data = await res.json();
                App.showToast(data.detail || "Failed", "error");
            }
        } catch(e) {
            App.showToast("Network Error", "error");
        }
    }
</script>
{% endblock %}
