    <!-- Admin Navbar -->
    <header class="bg-slate-800 border-b border-slate-700 px-6 flex justify-between items-center z-20 py-2">
        <div class="flex items-center">
            <a href="/dashboard" id="logo-link" class="flex items-center hover:opacity-80 transition-opacity">
                <img src="/static/img/logo.png" alt="Solu8i Logo" class="w-48 h-auto">
            </a>
        </div>
        <!-- Global Search -->
        <div class="flex-1 max-w-md mx-6 hidden md:block">
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-4 w-4 text-slate-500 group-focus-within:text-blue-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <input 
                    type="text" 
                    id="global-search-inv" 
                    placeholder="Cari Rekaman" 
                    class="block w-full bg-slate-900/50 border border-slate-700 rounded-lg pl-10 pr-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all"
                    onkeypress="if(event.key === 'Enter') handleGlobalSearch()"
                >
            </div>
        </div>

        <!-- User Avatar Dropdown -->
        <div class="relative">
            <button id="avatar-btn" onclick="toggleUserDropdown()" class="w-10 h-10 rounded-full bg-slate-900 flex items-center justify-center border-2 border-slate-600 hover:border-slate-400 transition-colors focus:outline-none overflow-hidden">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                </svg>
            </button>
            <!-- Dropdown Menu -->
            <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-56 bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 overflow-hidden z-50 transition-all">
                <!-- Role Display -->
                <div class="px-4 py-3 flex items-center gap-3 border-b border-slate-100 dark:border-slate-700/50">
                    <svg class="w-5 h-5 text-slate-500 dark:text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span id="dropdown-role" class="text-sm font-semibold text-slate-700 dark:text-slate-300">Super Admin</span>
                </div>
                <!-- Theme Toggle -->
                <div class="px-4 py-2 border-b border-slate-100 dark:border-slate-700/50">
                    <p class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2">Tema</p>
                    <div class="flex bg-slate-100 dark:bg-slate-900/50 p-1 rounded-lg gap-1 border dark:border-slate-700/30">
                        <button id="theme-light" onclick="setTheme('light')" class="theme-btn flex-1 flex items-center justify-center py-1.5 rounded-md transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z"></path></svg>
                        </button>
                        <button id="theme-dark" onclick="setTheme('dark')" class="theme-btn flex-1 flex items-center justify-center py-1.5 rounded-md transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                        </button>
                        <button id="theme-system" onclick="setTheme('system')" class="theme-btn flex-1 flex items-center justify-center py-1.5 rounded-md transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        </button>
                    </div>
                </div>

                <!-- Logout -->
                <button onclick="App.logout()" class="w-full px-4 py-3 flex items-center gap-3 text-slate-600 dark:text-slate-400 hover:bg-red-50 dark:hover:bg-red-900/20 hover:text-red-600 dark:hover:text-red-400 transition-colors text-sm font-medium">
                    <svg class="w-5 h-5 font-bold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Keluar
                </button>
            </div>
        </div>
    </header>

    <script>
    function toggleUserDropdown() {
        const dd = document.getElementById('user-dropdown');
        dd.classList.toggle('hidden');
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
        const dd = document.getElementById('user-dropdown');
        const btn = document.getElementById('avatar-btn');
        if (dd && btn && !btn.contains(e.target) && !dd.contains(e.target)) {
            dd.classList.add('hidden');
        }
    });



    // Theme switcher
    function setTheme(theme) {
        localStorage.setItem('theme', theme);
        applyTheme(theme);
        updateThemeButtons(theme);
    }

    function applyTheme(theme) {
        const root = document.documentElement;
        if (theme === 'light') {
            root.classList.remove('dark');
        } else if (theme === 'dark') {
            root.classList.add('dark');
        } else {
            // system
            if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                root.classList.add('dark');
            } else {
                root.classList.remove('dark');
            }
        }
    }

    function updateThemeButtons(active) {
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.classList.remove('bg-white', 'dark:bg-slate-800', 'text-blue-600', 'dark:text-white', 'shadow-sm', 'dark:shadow-none');
            btn.classList.add('text-slate-400', 'dark:text-slate-500');
        });
        const activeBtn = document.getElementById('theme-' + active);
        if (activeBtn) {
            activeBtn.classList.add('bg-white', 'dark:bg-slate-800', 'text-blue-600', 'dark:text-white', 'shadow-sm', 'dark:shadow-none');
            activeBtn.classList.remove('text-slate-400', 'dark:text-slate-500');
        }
    }

    // Init on load
    document.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        applyTheme(savedTheme);
        updateThemeButtons(savedTheme);

        // Set role display
        const role = localStorage.getItem('user_role') || '';
        const roleMap = { 'SUPER_ADMIN': 'Super Admin', 'ADMIN': 'Admin', 'USER': 'User' };
        const roleEl = document.getElementById('dropdown-role');
        if (roleEl) roleEl.textContent = roleMap[role] || role;

        // Dynamic logo link
        const logoLink = document.getElementById('logo-link');
        if (logoLink) {
            logoLink.href = (role === 'SUPER_ADMIN') ? '/dashboard' : '/recorder';
        }
    });

    function handleGlobalSearch() {
        const query = document.getElementById('global-search-inv').value.trim();
        if (query) {
            window.location.href = `/videos_page?invoice_number=${encodeURIComponent(query)}`;
        }
    }
    </script>
