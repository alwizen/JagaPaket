{% extends "base.html" %}

{% block content %}
<div class="h-full flex flex-col">
    {% include 'admin_navbar.html' %}

    <div class="flex-1 overflow-hidden flex flex-col lg:flex-row relative">
        <!-- Sidebar Navigation -->
        {% include "admin_sidebar.html" %}

        <!-- Content Area -->
        <main class="flex-1 overflow-y-auto lg:overflow-hidden flex flex-col md:flex-row relative bg-slate-900">
        
        <!-- Main Panel -->
        <div class="flex-[3] flex flex-col relative h-full">
            <div id="video-container" class="relative flex-1 bg-black flex items-center justify-center overflow-hidden">
                <video id="webcam-preview" autoplay muted playsinline class="w-full h-full object-cover bg-black"></video>
                <canvas id="video-overlay" class="absolute inset-0 w-full h-full object-cover z-10 pointer-events-none"></canvas>
                
                <!-- Status Overlay -->
                <div id="recording-status" class="absolute top-6 left-6 z-20 flex items-center gap-3 bg-black/60 backdrop-blur px-4 py-2 rounded-full border border-slate-700 hidden">
                    <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
                    <span class="text-white font-mono font-bold tracking-wider">REC</span>
                    <span id="recording-timer" class="text-red-400 font-mono ml-2">00:00</span>
                </div>
            </div>
            
            <!-- Instructions Panel -->
            <div class="h-auto md:h-24 bg-slate-800 border-t border-slate-700 flex flex-col md:flex-row items-center justify-between px-4 py-4 md:px-8 z-10 gap-4">
                <div class="flex items-center gap-4">
                    <div class="bg-blue-900/50 p-3 rounded-lg border border-blue-800">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
  <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 3.75 9.375v-4.5ZM3.75 14.625c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5a1.125 1.125 0 0 1-1.125-1.125v-4.5ZM13.5 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 13.5 9.375v-4.5Z" />
  <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 6.75h.75v.75h-.75v-.75ZM6.75 16.5h.75v.75h-.75v-.75ZM16.5 6.75h.75v.75h-.75v-.75ZM13.5 13.5h.75v.75h-.75v-.75ZM13.5 19.5h.75v.75h-.75v-.75ZM19.5 13.5h.75v.75h-.75v-.75ZM19.5 19.5h.75v.75h-.75v-.75ZM16.5 16.5h.75v.75h-.75v-.75Z" />
</svg>

                    </div>
                    <div>
                        <h3 class="text-white font-bold text-lg">Scan Barcode</h3>
                        <p class="text-slate-400 text-sm hidden sm:block">Arahkan scanner atau input manual</p>
                    </div>
                </div>

                <!-- Manual Input Add-on -->
                <div class="flex items-center gap-2">
                    <input type="text" id="manual-invoice" placeholder="Ketik No. Inv..." 
                           onkeydown="if(event.key === 'Enter') startManualRecording()"
                           class="bg-slate-900 border border-slate-700 text-white rounded px-3 py-2 focus:outline-none focus:border-blue-500 w-40 text-sm">
                    <button onclick="startManualRecording()" 
                            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm font-bold transition-colors">
                        Mulai
                    </button>
                </div>
                
                <div class="flex items-center gap-4 opacity-50 transition-opacity" id="stop-instruction">
                    <div class="bg-red-900/50 px-4 py-2 rounded-lg border border-red-800 shadow-inner">
                        <span class="text-red-400 font-mono font-bold text-xl">F8</span>
                    </div>
                    <div>
                        <h3 class="text-red-300 font-bold text-lg">Tekan untuk Stop</h3>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Right Panel (History) -->
        <div class="flex-[1] hidden md:flex flex-col h-full bg-slate-800 border-l border-slate-700">
            <div class="p-4 border-b border-slate-700 bg-slate-900/50">
                <h3 class="text-white font-bold text-lg mb-2">Riwayat Rekaman</h3>
                <input type="text" id="search-invoice" placeholder="Cari No. Invoice..." 
                       class="w-full bg-slate-900 border border-slate-700 text-white rounded px-3 py-2 focus:outline-none focus:border-blue-500 text-sm shadow-inner">
            </div>
            <div class="flex-1 overflow-y-auto p-4 custom-scrollbar">
                <div class="space-y-3" id="recent-videos-list">
                    <!-- Populated by JS -->
                    <div class="text-slate-500 text-sm text-center py-4">Memuat riwayat...</div>
                </div>
            </div>
        </div>
        
    </div>
</div>

<!-- Modal Player -->
<div id="video-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 hidden flex-col items-center justify-center p-8">
    <div class="w-full max-w-4xl flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold text-white">Pratinjau Video</h3>
        <button onclick="closeModal()" class="text-white hover:text-red-400 bg-slate-800 p-2 rounded-full border border-slate-700">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
    </div>
    <video id="modal-video-player" class="w-full max-w-4xl bg-black rounded-lg shadow-2xl border border-slate-700" controls></video>
</div>

{% endblock %}

{% block scripts %}
<script src="/static/js/recorder.js?v=7"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const username = localStorage.getItem('username');
        const role = localStorage.getItem('user_role');
        
        if(!username) {
            window.location.href = '/';
            return;
        }
        

        // Set dropdown role
        const roleMap = { 'SUPER_ADMIN': 'Super Admin', 'ADMIN': 'Admin', 'USER': 'User' };
        const roleEl = document.getElementById('dropdown-role');
        if (roleEl) roleEl.textContent = roleMap[role] || role;

        if(role === 'SUPER_ADMIN') {
            const dashLink = document.getElementById('nav-dashboard-link');
            if(dashLink) dashLink.classList.replace('hidden', 'flex');
        }
    });
</script>
{% endblock %}
